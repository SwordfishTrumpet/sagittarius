server {
    server_name webmail.wellintime.com;
    include /etc/nginx/conf.d/security-headers.conf;

    # JMAP WebSocket - needs auth header conversion per RFC 8887
    location /jmap/ws {
        set $auth_header "";
        if ($arg_access_token) {
            set $auth_header "Basic $arg_access_token";
        }

        # Proxy directly to JMAP backend (not to Sagittarius)
        proxy_pass http://mail.wellintime.com:8080/jmap/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host mail.wellintime.com;
        proxy_set_header Authorization $auth_header;
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # JMAP API - needs auth header conversion for EventSource fallback
    location /jmap {
        # Use query param token if present, otherwise pass through browser's Authorization header
        set $auth_header $http_authorization;
        if ($arg_access_token) {
            set $auth_header "Basic $arg_access_token";
        }

        proxy_pass http://192.168.68.200:3000/jmap;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $auth_header;
        
        # SSE/EventSource specific
        proxy_buffering off;
        proxy_cache off;
    }

    # Everything else → Sagittarius
    location / {
        proxy_pass http://192.168.68.200:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    http2 on;
    ssl_certificate /etc/nginx/live/webmail.wellintime.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/live/webmail.wellintime.com/privkey.pem;
    include /etc/nginx/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/ssl-dhparams.pem;
}

server {
    if ($host = webmail.wellintime.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name webmail.wellintime.com;
    return 404;
}
